<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登场人物介绍编辑器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="preview-panel" aria-label="图片预览">
            <div class="workspace-layout">
                <div id="canvasStage" class="canvas-stage">
                    <canvas id="memeCanvas" width="1080" height="1700"></canvas>
                    <div id="inlineEditors" class="inline-editors" aria-label="角色编辑区"></div>
                </div>

                <aside class="side-toolbar" aria-label="编辑工具">
                    <div class="toolbar-group">
                        <label class="field title-field">
                            <span>标题</span>
                            <input id="titleInput" type="text" value="登场角色介绍" maxlength="18">
                        </label>

                        <label class="field subtitle-field">
                            <span>副标题</span>
                            <input id="subtitleInput" type="text" placeholder="可选副标题" maxlength="22">
                        </label>
                    </div>

                    <div class="toolbar-actions">
                        <button id="addCharacterButton" class="secondary-button add-character-button" type="button">添加角色</button>
                    </div>

                    <div class="toolbar-delete">
                        <button id="deleteModeButton" class="danger-button" type="button">删除角色</button>
                        <div id="deleteModeActions" class="delete-mode-actions" hidden>
                            <p id="deleteModeHint" class="delete-mode-hint">点击头像选择要删除的角色</p>
                            <button id="selectAllDeleteButton" class="secondary-button" type="button">全选</button>
                            <button id="confirmDeleteButton" class="danger-button" type="button">确定删除</button>
                            <button id="cancelDeleteButton" class="secondary-button" type="button">取消</button>
                        </div>
                    </div>

                    <div class="toolbar-export">
                        <button id="downloadButton" class="primary-button" type="button">下载成图</button>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <div id="cropOverlay" class="crop-overlay" hidden>
        <section class="crop-dialog" aria-label="图片裁切">
            <div class="crop-heading">
                <strong id="cropTitle">调整头像</strong>
                <button id="cropCloseButton" class="icon-button" type="button" aria-label="关闭">×</button>
            </div>

            <div class="crop-workspace">
                <canvas id="cropCanvas" width="420" height="420"></canvas>
            </div>

            <label class="crop-slider">
                <span>缩放</span>
                <input id="cropZoomInput" type="range" min="1" max="3" step="0.01" value="1">
            </label>

            <div class="crop-actions">
                <label class="secondary-button replace-image-button">
                    更换图片
                    <input id="cropReplaceInput" class="modal-file-input" type="file" accept="image/*">
                </label>
                <button id="cropSaveButton" class="primary-button" type="button">应用</button>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
